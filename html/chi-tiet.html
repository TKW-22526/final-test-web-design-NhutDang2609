<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>CHI TIẾT SẢN PHẨM</title>
  <link rel="stylesheet" href="../css/style-ct.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/lib.js"></script>
</head>
<body>

<nav>
  <a class="nav-brand" href="../index.html">🌸 Tiệm của Bơ</a>
  <div class="nav-links">
    <a href="../index.html">Trang Chủ</a>
    <a href="gioi-thieu.html">Giới Thiệu</a>
    <a href="san-pham.html">Sản Phẩm</a>
    <a href="lien-he.html">Liên Hệ</a>
  </div>
</nav>

<!-- Nút giỏ hàng nổi -->
<div style="position:fixed; top:80px; right:20px; z-index:999;">
  <div onclick="moGioHang()" style="cursor:pointer; position:relative; font-size:30px;">
    🛒
    <span id="cart-count" style="position:absolute; top:-5px; right:-10px; background:red; color:white; border-radius:50%; font-size:11px; font-weight:bold; width:18px; height:18px; display:flex; align-items:center; justify-content:center;">0</span>
  </div>
  <div id="popup" style="display:none; position:absolute; right:0; margin-top:8px; background:white; border:1px solid #ddd; border-radius:10px; padding:15px; width:200px; box-shadow:2px 2px 10px rgba(0,0,0,0.2);">
    <div id="popup-noidung"></div>
    <button onclick="document.getElementById('popup').style.display='none'" style="margin-top:8px; width:100%; padding:5px; border:none; background:#eee; border-radius:6px; cursor:pointer;">Đóng</button>
  </div>
</div>

<!-- Chi tiết sản phẩm -->
<div class="container mt-5">
  <div class="row">
    <div class="col-md-5">
      <img id="p-image" src="" alt="" style="width:100%; height:350px; object-fit:cover; border-radius:8px;">
    </div>
    <div class="col-md-7" style="background:white; border-radius:8px; padding:20px;">
      <h3 id="p-name" class="text-primary"></h3>
      <p id="p-price" class="text-danger fw-bold"></p>
      <h5>Mô tả</h5>
      <p id="p-desc"></p>
      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-danger" onclick="muaNgay()"> Mua Ngay</button>
        <button class="btn btn-success" onclick="themGio()"> Thêm Giỏ Hàng</button>
      </div>
    </div>
  </div>
</div>

<script>
  // Lấy id sản phẩm từ URL
  const id = Number(new URLSearchParams(window.location.search).get("id"));
  const sp = productDatabase.find(p => p.id === id);

  // Hiển thị thông tin
  document.getElementById("p-name").innerText = sp.name;
  document.getElementById("p-price").innerText = sp.price.toLocaleString() + " VND";
  document.getElementById("p-image").src = sp.img;
  document.getElementById("p-desc").innerText = sp.desc;

  // Giỏ hàng lưu dạng "1,2,3"
  function layGio() {
    const chuoi = localStorage.getItem("shopCart") || "";
    return chuoi === "" ? [] : chuoi.split(",").map(Number);
  }
  function luuGio(gio) {
    localStorage.setItem("shopCart", gio.join(","));
  }
  function capNhatBadge() {
    document.getElementById("cart-count").innerText = layGio().length;
  }

  // Mở popup giỏ hàng
  function moGioHang() {
    const popup = document.getElementById("popup");
    if (popup.style.display === "block") { popup.style.display = "none"; return; }
    const soLuong = layGio().length;
    const nd = soLuong === 0 ? "Giỏ hàng trống!" : "Bạn có <b style='color:red'>" + soLuong + "</b> sản phẩm.";
    document.getElementById("popup-noidung").innerHTML = nd;
    popup.style.display = "block";
  }

  // Thêm vào giỏ
  function themGio() {
    const gio = layGio();
    gio.push(id);
    luuGio(gio);
    capNhatBadge();
    alert("Đã thêm vào giỏ hàng!");
  }

  // Mua ngay
  function muaNgay() {
    const gio = layGio();
    gio.push(id);
    luuGio(gio);
    window.location.href = "gio-hang.html";
  }

  capNhatBadge();
</script>

  <div class="footer-inner">
    <div>

  <div class="footer-bottom">Trang web được thiết kế bởi Vũ Thị Nhựt Đang @2026 · HTML tĩnh</div>
</footer>

</body>
</html>
