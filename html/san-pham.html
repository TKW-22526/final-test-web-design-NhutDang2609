<h2>Sản Phẩm</h2>

<div class="container-fluid mt-5">
  <div id="product-list" class="product-grid"></div>
</div>

<script>
  const chuoi = localStorage.getItem("shopDeletedIds") || "";
  const deletedIds = chuoi === "" ? [] : chuoi.split(",").map(Number);

  const visibleProducts = productDatabase.filter(p => !deletedIds.includes(p.id));

  const container = document.getElementById("product-list");
  container.className = "row";

  visibleProducts.forEach(product => {
    const col = document.createElement("div");
    col.className = "col-6 col-md-4 col-lg-3 mb-4";
    col.innerHTML = `
      <div class="card h-100">
        <img src="${product.img}" class="card-img-top" style="height:180px; object-fit:cover;">
        <div class="card-body">
          <h6 class="card-title">${product.name}</h6>
          <p class="card-text text-danger fw-bold">${product.price.toLocaleString()} VND</p>
          <a href="chi-tiet.html?id=${product.id}" class="btn btn-sm btn-outline-secondary w-100">Xem chi tiết</a>
        </div>
      </div>`;
    container.appendChild(col);
  });
</script>
