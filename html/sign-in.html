<h3 class="page-title">Đăng Nhập </h3>
    <div class="container d-flex justify-content-center">
      <form id="frmLogin">
        

        <div id="alertMsg" style="display:none;"></div>

        <div class="form-group">
          <label for="txtUsername">Tên đăng nhập (Email):</label>
          <input class="form-control" type="text" id="txtUsername"
                 name="txtUsername" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="txtPassword">Mật khẩu:</label>
          <input class="form-control" type="password" id="txtPassword"
                 name="txtPassword" placeholder="Nhập mật khẩu" required>
        </div>

        <input class="button" type="submit" id="sbLogin" name="sbLogin" value="Đăng nhập">
        <a href="sign-up.html"><input class="button" type="button" value="Đăng ký"></a>
      </form>
    </div>
