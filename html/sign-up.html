<h2 class="page-title">Đăng Ký</h2>
<div class="container d-flex justify-content-center">
      <form id="frmRegister">
        

        <div id="alertMsg" style="display:none;"></div>

        <div class="form-group">
          <label for="txtHoTen"><b>Họ tên:</b></label>
          <input class="form-control" type="text" id="txtHoTen"
                 name="txtHoTen" placeholder="Nguyễn Văn A">
        </div>

        <div class="form-group">
          <label for="txtEmail"><b>Email:</b></label>
          <input class="form-control" type="email" id="txtEmail"
                 name="txtEmail" placeholder="example@email.com">
        </div>

        <div class="form-group">
          <label><b>Giới tính:</b></label>
          <div class="rdgioitinh">
            <label><input type="radio" name="rdGioiTinh" value="Nam"> Nam</label>
            <label><input type="radio" name="rdGioiTinh" value="Nữ"> Nữ</label>
          </div>
        </div>

        <div class="form-group">
          <label for="txtDT"><b>Số điện thoại:</b></label>
          <input class="form-control" type="number" id="txtDT"
                 name="txtDT" placeholder="0912345678">
        </div>

        <div class="form-group">
          <label for="txtPassword"><b>Mật khẩu:</b></label>
          <input class="form-control" type="password" id="txtPassword"
                 name="txtPassword" placeholder="Nhập mật khẩu">
        </div>

        <div class="form-group">
          <label for="txtConfirmPassword"><b>Xác nhận mật khẩu:</b></label>
          <input class="form-control" type="password" id="txtConfirmPassword"
                 name="txtConfirmPassword" placeholder="Nhập lại mật khẩu">
        </div>

        <div>
          <input class="button" type="submit" id="sbRegister"
                 name="sbRegister" value="Đăng ký">
        </div>
      </form>
    </div>
